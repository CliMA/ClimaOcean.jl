agents:
  queue: central
  slurm_mem: 10G
  modules: climacommon/2026_02_18

timeout_in_minutes: 1440

env:
  OPENBLAS_NUM_THREADS: 1
  OMPI_MCA_opal_warn_on_missing_libcuda: 0
  JULIA_NUM_PRECOMPILE_TASKS: 8
  JULIA_DEPOT_PATH: "${BUILDKITE_BUILD_PATH}/${BUILDKITE_PIPELINE_SLUG}/depot/default:"

steps:
  - label: "🏕️ initialize"
    key: "init"
    env:
      TEST_GROUP: "init"
    command:
      - "echo '--- Instantiate project'"
      - "julia --project -e 'using Pkg; Pkg.instantiate(verbose=true)'"

      - "echo '--- Precompile project'"
      - "julia --project -e 'using Pkg; Pkg.precompile(strict=true)'"
      - "julia --project -e 'using Pkg; Pkg.status()'"

      - "echo '--- Initialize ClimaOcean test suite'"
      - "julia --project -e 'using CUDA; CUDA.precompile_runtime()'"
      - "julia --project -e 'using Pkg; Pkg.test()'"
    concurrency: 1
    concurrency_group: 'depot/climaocean-ci'
    agents:
      slurm_gpus: 1
      slurm_cpus_per_task: 8

  - wait

#####
##### CPU tests
#####

  - label: "{{ matrix.case }} CPU tests"
    key: "cpu_tests"
    command: |
      set -euo pipefail

      case "{{ matrix.case }}" in
        "🌦️ JRA55")            export TEST_GROUP="JRA55" ;;
        "🌊 ECCO2Monthly")     export TEST_GROUP="ecco2_monthly" ;;
        "🐚 ECCO2Daily")       export TEST_GROUP="ecco2_daily" ;;
        "🦑 ECCO4/EN4")        export TEST_GROUP="ecco4_en4" ;;
        "💨 surface flux")     export TEST_GROUP="fluxes" ;;
        "🏔️ bathymetry")       export TEST_GROUP="bathymetry" ;;
        "🐎 checkpointing")    export TEST_GROUP="checkpointing" ;;
        *) echo "Unknown CPU matrix case: {{ matrix.case }}"; exit 2 ;;
      esac

      julia --project -e 'using Pkg; Pkg.test()'
    agents:
      slurm_mem: 32G
      slurm_cpus_per_task: 8
      slurm_ntasks: 1
    matrix:
      setup:
        case:
          - "🌦️ JRA55"
          - "🌊 ECCO2Monthly"
          - "🐚 ECCO2Daily"
          - "🦑 ECCO4/EN4"
          - "💨 surface flux"
          - "🏔️ bathymetry"
          - "🐎 checkpointing"

  #####
  ##### GPU tests
  #####

  - label: "{{ matrix.case }} GPU tests (10G)"
    key: "gpu_tests_10g"
    env:
      GPU_TEST: "true"
    command: |
      set -euo pipefail

      case "{{ matrix.case }}" in
        "🌊 ECCO2Monthly")     export TEST_GROUP="ecco2_monthly" ;;
        "🐚 ECCO2Daily")       export TEST_GROUP="ecco2_daily" ;;
        "🦑 ECCO4/EN4")        export TEST_GROUP="ecco4_en4" ;;
        "💨 surface flux")     export TEST_GROUP="fluxes" ;;
        "🏔️ bathymetry")       export TEST_GROUP="bathymetry" ;;
        "🐎 checkpointing")    export TEST_GROUP="checkpointing" ;;
        "🧊 OceanSeaIceModel") export TEST_GROUP="ocean_sea_ice_model" ;;
        *) echo "Unknown GPU(10G) matrix case: {{ matrix.case }}"; exit 2 ;;
      esac

      julia --project -e 'using Pkg; Pkg.test()'
    agents:
      slurm_mem: 10G
      slurm_gpus: 1
      slurm_cpus_per_task: 8
      slurm_ntasks: 1
      slurm_gpus_per_task: 1
    matrix:
      setup:
        case:
          - "🌊 ECCO2Monthly"
          - "🐚 ECCO2Daily"
          - "🦑 ECCO4/EN4"
          - "💨 surface flux"
          - "🏔️ bathymetry"
          - "🐎 checkpointing"
          - "🧊 OceanSeaIceModel"

  - label: "{{ matrix.case }} GPU tests (32G)"
    key: "gpu_tests_32g"
    env:
      GPU_TEST: "true"
    command: |
      set -euo pipefail

      case "{{ matrix.case }}" in
        "🌦️ JRA55") export TEST_GROUP="JRA55" ;;
        *) echo "Unknown GPU(32G) matrix case: {{ matrix.case }}"; exit 2 ;;
      esac

      julia --project -e 'using Pkg; Pkg.test()'
    agents:
      slurm_mem: 32G
      slurm_gpus: 1
      slurm_cpus_per_task: 8
      slurm_ntasks: 1
      slurm_gpus_per_task: 1
    matrix:
      setup:
        case:
          - "🌦️ JRA55"


  #####
  ##### Distributed tests
  #####

  - label: "🐙 Run distributed tests"
    key: "test_distributed"
    env:
      TEST_GROUP: "distributed"
    commands:
      - "srun julia --project -e 'using Pkg; Pkg.test()'"
    agents:
      slurm_mem: 10G
      slurm_cpus_per_task: 1
      slurm_ntasks: 4
      modules: mpiwrapper/2024_05_27 climacommon/2026_02_18
    soft_fail: true # remove this after library issues on central are fixed

  - wait: ~
    continue_on_failure: true
