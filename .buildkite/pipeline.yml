agents:
  queue: central
  slurm_mem: 16G
  modules: climacommon/2026_02_18

timeout_in_minutes: 2880

env:
  OPENBLAS_NUM_THREADS: 1
  OMPI_MCA_opal_warn_on_missing_libcuda: 0
  JULIA_NUM_PRECOMPILE_TASKS: 8
  JULIA_DEPOT_PATH: "${BUILDKITE_BUILD_PATH}/${BUILDKITE_PIPELINE_SLUG}/depot/default:"

steps:
  - label: "🏕️ initialize"
    key: "init"
    env:
      TEST_GROUP: "init"
    command:
      - "echo '--- Instantiate project'"
      - "julia --project -e 'using Pkg; Pkg.instantiate(verbose=true)'"

      - "echo '--- Precompile project'"
      - "julia --project -e 'using Pkg; Pkg.precompile(strict=true)'"
      - "julia --project -e 'using Pkg; Pkg.status()'"

      - "echo '--- Initialize ClimaOcean test suite'"
      - "julia --project -e 'using CUDA; CUDA.precompile_runtime()'"
      - "julia --project -e 'using Pkg; Pkg.test()'"
    concurrency: 1
    concurrency_group: 'depot/climaocean-ci'
    agents:
      slurm_gpus: 1
      slurm_cpus_per_task: 8

  - wait

  #####
  ##### Very simple tests
  #####

  - label: "{{ matrix.case }} Unit tests"
    key: "unit_tests"
    command: |
      set -euo pipefail

      case "{{ matrix.case }}" in
        "🌦️ Unit")            export TEST_GROUP="unit" ;;
        *) echo "Unknown CPU matrix case: {{ matrix.case }}"; exit 2 ;;
      esac

      julia --project -e 'using Pkg; Pkg.test()'
    agents:
      slurm_mem: 32G
      slurm_cpus_per_task: 8
      slurm_ntasks: 1
    matrix:
      setup:
        case:
          - "🌦️ Unit"

  #####
  ##### Distributed simulation (1/6° on 4 GPUs, runs before docs so output is available)
  #####

  - label: "🌊 sixth-degree distributed simulation"
    key: "sixth_degree"
    env:
      GPU_TEST: "true"
    command: |
      set -euo pipefail

      # Only run on main, tags, or when commit message contains "[build all examples]"
      if [[ "${BUILDKITE_BRANCH}" == "main" || "${BUILDKITE_TAG:-}" == v* || "${BUILDKITE_MESSAGE:-}" == *"[build all examples]"* ]]; then
          julia --project examples/sixth_degree_tripolar_ocean_sea_ice.jl
      else
          echo "Skipping distributed simulation (not on main/tag and no [build all examples] label)"
      fi
    agents:
      slurm_mem: 32G
      slurm_gpus: 4
      slurm_cpus_per_task: 8
      slurm_ntasks: 4
      slurm_gpus_per_task: 1

  - wait

  #####
  ##### Documentation
  #####

  - label: "📖 documentation"
    key: "docs"
    env:
      CI: "true"
    command: |
      set -euo pipefail

      # Build all examples on main, tags, or when the commit message contains "[build all examples]"
      if [[ "${BUILDKITE_BRANCH}" == "main" || "${BUILDKITE_TAG:-}" == v* || "${BUILDKITE_MESSAGE:-}" == *"[build all examples]"* ]]; then
          export CLIMAOCEAN_BUILD_ALL_EXAMPLES=true
      else
          export CLIMAOCEAN_BUILD_ALL_EXAMPLES=false
      fi

      echo "CLIMAOCEAN_BUILD_ALL_EXAMPLES=${CLIMAOCEAN_BUILD_ALL_EXAMPLES}"

      julia --project=docs -e 'using Pkg; Pkg.instantiate(verbose=true)'
      julia --project=docs docs/make.jl
    agents:
      slurm_mem: 32G
      slurm_gpus: 1
      slurm_cpus_per_task: 8
      slurm_ntasks: 1
